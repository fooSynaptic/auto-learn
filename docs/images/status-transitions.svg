<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" role="img" aria-label="Status transitions">
  <defs>
    <marker id="arw-status" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 18px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .section { font: 13px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #166534; font-weight: 700; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.6; rx: 8; }
      .label { font: 12px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0f172a; text-anchor: middle; }
      .edge { stroke: #475569; stroke-width: 1.5; fill: none; marker-end: url(#arw-status); }
      .hint { font: 12px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #64748b; }
    </style>
  </defs>
  <text x="360" y="26" class="title" text-anchor="middle">状态流转</text>
  <text x="24" y="58" class="section">problem-list</text>
  <rect x="24" y="68" width="64" height="36" class="box"/>
  <text x="56" y="91" class="label">open</text>
  <rect x="108" y="68" width="56" height="36" class="box"/>
  <text x="136" y="91" class="label">wip</text>
  <rect x="184" y="68" width="72" height="36" class="box"/>
  <text x="220" y="91" class="label">solved</text>
  <line x1="88" y1="86" x2="106" y2="86" class="edge"/>
  <line x1="164" y1="86" x2="182" y2="86" class="edge"/>
  <text x="320" y="91" class="hint">→ &lt;CATALOG_SOLVED&gt;；可泛化 → &lt;CATALOG_TOOL&gt;</text>
  <text x="24" y="148" class="section">reading-list</text>
  <rect x="24" y="158" width="56" height="36" class="box"/>
  <text x="52" y="181" class="label">inbox</text>
  <rect x="96" y="158" width="64" height="36" class="box"/>
  <text x="128" y="181" class="label">active</text>
  <rect x="176" y="158" width="56" height="36" class="box"/>
  <text x="204" y="181" class="label">done</text>
  <rect x="248" y="158" width="72" height="36" class="box"/>
  <text x="284" y="181" class="label">archived</text>
  <line x1="80" y1="176" x2="94" y2="176" class="edge"/>
  <line x1="160" y1="176" x2="174" y2="176" class="edge"/>
  <line x1="232" y1="176" x2="246" y2="176" class="edge"/>
</svg>
